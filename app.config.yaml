application:
  actions: actions
  web: web-src
  runtimeManifest:
    database:
      auto-provision: false
      region: emea
    packages:
      db-ui:
        license: Apache-2.0
        actions:
          generic:
            function: actions/generic/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
            annotations:
              require-adobe-auth: true
              final: true
          publish-events:
            function: actions/publish-events/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              apiKey: $SERVICE_API_KEY
            annotations:
              require-adobe-auth: true
              final: true
          db-explorer:
            function: actions/db-explorer/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              region: $AIO_DB_REGION
            annotations:
              require-adobe-auth: false
              include-ims-credentials: true
              final: true
